<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הסידור שלי - רולדין</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="employee-container">
    <div class="employee-header">
      <h1>רולדין - הסידור שלי</h1>
      <div class="emp-name" id="empName"></div>
      <div id="empRole" style="margin-top:4px"></div>
    </div>

    <div id="loading" style="text-align:center;padding:40px;color:var(--text-muted)">טוען...</div>
    <div id="error" style="display:none;text-align:center;padding:40px;color:var(--danger)"></div>

    <div id="content" style="display:none">
      <div id="myShiftsSection">
        <h3 style="color:var(--gold);margin-bottom:12px">המשמרות שלי</h3>
        <div id="myShifts"></div>
      </div>

      <div style="margin-top:24px">
        <h3 style="color:var(--gold);margin-bottom:12px">סידור מלא - השבוע</h3>
        <div id="fullSchedule"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');

    const dayNames = { 0: 'ראשון', 1: 'שני', 2: 'שלישי', 3: 'ר��יעי', 4: 'חמישי', 5: 'שישי', 6: 'שבת' };
    const roleColors = {
      shift_manager: '#e74c3c', barista: '#3498db', cashier: '#2ecc71',
      kitchen: '#f39c12', general: '#95a5a6'
    };

    if (!token) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'קישור לא תקין';
    } else {
      loadSchedule();
    }

    async function loadSchedule() {
      try {
        const res = await fetch(`/api/my-schedule/${token}`);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error);
        }
        const data = await res.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        document.getElementById('empName').textContent = data.employee.name;
        document.getElementById('empRole').innerHTML = `<span class="role-badge role-${data.employee.role}">${data.employee.role}</span>`;

        // My shifts
        const currentWeek = data.mySchedule[0];
        if (!currentWeek || currentWeek.shifts.length === 0) {
          document.getElementById('myShifts').innerHTML = '<div class="card"><p style="color:var(--text-muted);padding:12px">אין משמרות משובצות</p></div>';
        } else {
          document.getElementById('myShifts').innerHTML = currentWeek.shifts.map(s => {
            const d = new Date(s.date);
            const dayName = dayNames[d.getDay()] || '';
            return `<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px">
              <div style="background:var(--gold);color:var(--bg);width:50px;height:50px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center">
                <div style="font-size:0.7em">${dayName}</div>
                <div style="font-size:1.2em;font-weight:bold">${d.getDate()}.${d.getMonth()+1}</div>
              </div>
              <div>
                <strong>${s.shiftId}</strong>
              </div>
            </div>`;
          }).join('');
        }

        // Full schedule
        if (data.fullSchedule) {
          const days = Object.entries(data.fullSchedule.days).filter(([,v]) => v !== null);
          let html = '';
          for (const [dateStr, shifts] of days) {
            const d = new Date(dateStr);
            const dayName = dayNames[d.getDay()] || '';
            html += `<div class="card" style="margin-bottom:8px">
              <div class="day-name" style="color:var(--gold);margin-bottom:8px">${dayName} ${d.getDate()}.${d.getMonth()+1}</div>`;
            for (const [shiftId, emps] of Object.entries(shifts)) {
              html += `<div style="margin-bottom:6px"><strong style="color:var(--text-muted)">${shiftId}:</strong> `;
              html += emps.map(e => {
                const color = roleColors[e.role] || '#95a5a6';
                return `<span style="display:inline-block;padding:2px 6px;margin:1px;border-radius:4px;font-size:0.85em;background:${color}22;color:${color}">${e.name}</span>`;
              }).join('');
              html += '</div>';
            }
            html += '</div>';
          }
          document.getElementById('fullSchedule').innerHTML = html || '<p style="color:var(--text-muted)">אין סידור מפורסם</p>';
        } else {
          document.getElementById('fullSchedule').innerHTML = '<p style="color:var(--text-muted)">אין סידור מפורסם עדיין</p>';
        }
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = err.message || 'שגיאה';
      }
    }
  </script>
</body>
</html>
